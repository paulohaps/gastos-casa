<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisão de Gastos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 text-white p-2 rounded-lg">
                    <i class="fa-solid fa-wallet text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Gastos</h1>
            </div>
            
            <div class="flex items-center gap-3 w-full sm:w-auto overflow-x-auto">
                <div class="relative bg-slate-100 rounded-lg p-1 flex items-center border border-slate-200">
                    <i class="fa-regular fa-calendar ml-2 text-slate-500"></i>
                    <select id="seletorMes" onchange="mudarMes()" class="bg-transparent border-none text-sm font-bold text-slate-700 focus:ring-0 cursor-pointer pr-6 py-1 outline-none">
                        <option value="">Carregando meses...</option>
                    </select>
                </div>

                <button onclick="gerarResumo()" class="bg-slate-800 hover:bg-slate-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition shadow flex items-center gap-2 whitespace-nowrap">
                    <i class="fa-solid fa-file-invoice"></i> Resumo
                </button>
                <span id="connectionStatus" class="flex items-center gap-1 text-sm font-medium px-3 py-1 rounded-full border hidden transition-colors duration-300"></span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 space-y-6">

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex flex-col justify-center">
                <p class="text-slate-500 text-sm font-medium mb-1">Custo Total do Mês</p>
                <h3 id="cardTotal" class="text-3xl font-bold text-slate-800">R$ 0,00</h3>
            </div>
            
            <div class="bg-gradient-to-br from-indigo-50 to-white rounded-2xl p-5 shadow-sm border border-indigo-100 relative overflow-hidden">
                <div class="absolute right-0 bottom-0 opacity-10 text-6xl translate-x-4 translate-y-4 text-indigo-600"><i class="fa-solid fa-user"></i></div>
                <p class="text-indigo-600 text-sm font-bold mb-1 uppercase tracking-wider">Paulo Henrique</p>
                <h3 id="cardPaulo" class="text-3xl font-bold text-slate-800">R$ 0,00</h3>
            </div>

            <div class="bg-gradient-to-br from-emerald-50 to-white rounded-2xl p-5 shadow-sm border border-emerald-100 relative overflow-hidden">
                <div class="absolute right-0 bottom-0 opacity-10 text-6xl translate-x-4 translate-y-4 text-emerald-600"><i class="fa-solid fa-user-astronaut"></i></div>
                <p class="text-emerald-600 text-sm font-bold mb-1 uppercase tracking-wider">Fernando Gustavo</p>
                <h3 id="cardGustavo" class="text-3xl font-bold text-slate-800">R$ 0,00</h3>
            </div>

            <div id="cardAcertoBox" class="bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700 text-white flex flex-col justify-center">
                <p class="text-slate-400 text-sm font-medium mb-1">Acerto de Contas</p>
                <h3 id="cardAcertoValor" class="text-2xl font-bold text-white mb-1">R$ 0,00</h3>
                <p id="cardAcertoTexto" class="text-sm font-medium text-slate-300">Tudo quite!</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="space-y-6 lg:col-span-1">
                
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-plus-circle text-indigo-600"></i> Novo Gasto
                    </h3>
                    <form id="formGasto" class="space-y-4">
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Data do Gasto</label>
                            <input type="date" id="inputData" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Quem pagou?</label>
                            <select id="inputUsuario" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                <option value="Paulo Henrique">Paulo Henrique</option>
                                <option value="Fernando Gustavo">Fernando Gustavo</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Valor (R$)</label>
                            <div class="relative">
                                <span class="absolute left-4 top-2.5 text-slate-500 font-medium">R$</span>
                                <input type="number" id="inputValor" step="0.01" min="0.01" required placeholder="0.00" 
                                    class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-10 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Descrição</label>
                            <input type="text" id="inputDescricao" required placeholder="Ex: Conta de Luz, Aluguel" 
                                class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Categoria</label>
                            <select id="inputCategoria" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                <option value="Mercado">🛒 Mercado</option>
                                <option value="Contas">📄 Contas (Luz, Água, Net)</option>
                                <option value="Aluguel">🏠 Aluguel / Condomínio</option>
                                <option value="Ifood">🍔 Delivery / Ifood</option>
                                <option value="Outros">✨ Outros</option>
                            </select>
                        </div>
                        <button type="submit" id="btnSubmit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition mt-2 flex justify-center items-center gap-2 shadow-lg shadow-indigo-200">
                            <span>Lançar Despesa</span>
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                    <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4 text-center">Proporção de Pagamentos</h3>
                    <div class="relative h-48 w-full flex justify-center">
                        <canvas id="chartDivisao"></canvas>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col h-[750px]">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white z-10">
                        <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-list-check text-indigo-600"></i> Histórico do Mês Selecionado
                        </h3>
                        <button onclick="carregarDados(document.getElementById('seletorMes').value)" class="text-slate-400 hover:text-indigo-600 transition p-2 bg-slate-50 rounded-lg border border-slate-200">
                            <i class="fa-solid fa-arrows-rotate"></i> Atualizar
                        </button>
                    </div>
                    <div class="overflow-y-auto flex-1 hide-scrollbar p-0">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 sticky top-0 z-10 shadow-sm">
                                <tr>
                                    <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase">Data</th>
                                    <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase">Descrição</th>
                                    <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase">Quem</th>
                                    <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase text-right">Valor</th>
                                    <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaHistorico" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-12 text-slate-400">
                            <i class="fa-solid fa-receipt text-4xl mb-3 text-slate-200"></i>
                            <p>Nenhum gasto registrado neste mês ainda.</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-emerald-400"></i>
        <span id="toastMsg">Gasto salvo com sucesso!</span>
    </div>

    <script>
        // ==========================================
        // COLE SUA NOVA URL GERADA AQUI 👇
        // ==========================================
        const apiUrl = 'https://script.google.com/macros/s/AKfycbxVQpIEx_SLhW6BXmS0K4Fvxk5P67rju2_ofPCrQ30Qso7Xmr8SSMGm1jpd72xXwcnnhw/exec';

        let chartPizzaInstance = null;
        let resumoDados = { total: 0, paulo: 0, gustavo: 0, textoAcerto: "" };
        let mesAtualVigente = `${(new Date().getMonth() + 1).toString().padStart(2, '0')}/${new Date().getFullYear()}`;

        window.onload = () => {
            // Seta a data de hoje por padrão no input de data
            document.getElementById('inputData').valueAsDate = new Date();
            carregarMesesDisponiveis();
        };

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const icon = toast.querySelector('i');
            icon.className = isError ? "fa-solid fa-circle-xmark text-red-400" : "fa-solid fa-circle-check text-emerald-400";
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function setStatusUi(state) {
            const el = document.getElementById('connectionStatus');
            el.classList.remove('hidden');
            el.className = 'flex items-center gap-1 text-sm font-medium px-3 py-1 rounded-full border transition-colors duration-300';
            if (state === 'loading') {
                el.classList.add('text-amber-500', 'bg-amber-50', 'border-amber-200');
                el.innerHTML = '<span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span> Sincronizando...';
            } else if (state === 'online') {
                el.classList.add('text-emerald-600', 'bg-emerald-50', 'border-emerald-200');
                el.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500"></span> Conectado';
            }
        }

        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
        }

        async function carregarMesesDisponiveis() {
            try {
                const response = await fetch(`${apiUrl}?action=get_months`);
                const meses = await response.json();
                
                const seletor = document.getElementById('seletorMes');
                seletor.innerHTML = '';
                
                if(meses.length === 0) meses.push(mesAtualVigente);
                if(!meses.includes(mesAtualVigente)) meses.push(mesAtualVigente);

                meses.sort((a,b) => {
                    const [ma, ya] = a.split('/');
                    const [mb, yb] = b.split('/');
                    return new Date(yb, mb-1) - new Date(ya, ma-1);
                });

                meses.forEach(mes => {
                    const opt = document.createElement('option');
                    opt.value = mes;
                    opt.innerText = mes === mesAtualVigente ? `📅 ${mes} (Atual)` : mes;
                    seletor.appendChild(opt);
                });

                carregarDados(seletor.value);

            } catch (error) {
                console.error("Erro ao puxar meses", error);
                showToast("Erro de conexão", true);
            }
        }

        function mudarMes() {
            const mesSelecionado = document.getElementById('seletorMes').value;
            carregarDados(mesSelecionado);
        }

        async function carregarDados(mesParam) {
            let dados = [];
            try {
                setStatusUi('loading');
                const btnIcon = document.querySelector('.fa-arrows-rotate');
                if(btnIcon) btnIcon.classList.add('fa-spin');
                
                const urlCompleta = mesParam ? `${apiUrl}?month=${mesParam}` : apiUrl;
                
                const response = await fetch(urlCompleta);
                dados = await response.json();
                
                setStatusUi('online');
                if(btnIcon) btnIcon.classList.remove('fa-spin');

            } catch (error) {
                console.error(error);
                showToast("Erro ao ler dados.", true);
            }

            atualizarDashboards(dados);
        }

        async function deletarGasto(idGasto, btnElement) {
            if(!confirm("Tem certeza que deseja apagar este gasto?")) return;

            const mesSelecionado = document.getElementById('seletorMes').value;
            btnElement.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-slate-400"></i>';
            btnElement.disabled = true;

            const payload = { action: 'delete', id: idGasto, month: mesSelecionado };

            try {
                await fetch(apiUrl, { method: 'POST', body: JSON.stringify(payload) });
                showToast("Gasto apagado!");
                carregarDados(mesSelecionado);
            } catch (error) {
                showToast("Erro ao apagar.", true);
                btnElement.innerHTML = '<i class="fa-solid fa-trash-can"></i>';
                btnElement.disabled = false;
            }
        }

        function atualizarDashboards(dados) {
            let totalPaulo = 0; let totalGustavo = 0;
            const tbody = document.getElementById('tabelaHistorico');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';

            if(dados.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }

            dados.forEach((gasto) => {
                const valor = parseFloat(gasto.valor);
                
                if(!isNaN(valor)) {
                    // Cuidado com os nomes atualizados aqui no IF
                    if (gasto.usuario === 'Paulo Henrique') totalPaulo += valor;
                    else if (gasto.usuario === 'Fernando Gustavo') totalGustavo += valor;

                    const cat = gasto.categoria || 'Outros';
                    const iconUser = gasto.usuario === 'Paulo Henrique' ? 
                        '<span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-[10px] uppercase font-bold tracking-wider">Paulo</span>' : 
                        '<span class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-[10px] uppercase font-bold tracking-wider">Gustavo</span>';

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition border-b border-slate-50";
                    tr.innerHTML = `
                        <td class="py-3 px-6 text-sm text-slate-500 whitespace-nowrap">${gasto.data}</td>
                        <td class="py-3 px-6 text-sm text-slate-800 font-medium">
                            ${gasto.descricao} <br><span class="text-xs text-slate-400 font-normal">${cat}</span>
                        </td>
                        <td class="py-3 px-6 text-sm">${iconUser}</td>
                        <td class="py-3 px-6 text-sm text-slate-800 font-bold text-right">${formatarMoeda(valor)}</td>
                        <td class="py-3 px-6 text-center">
                            <button onclick="deletarGasto('${gasto.id}', this)" class="text-slate-300 hover:text-red-500 hover:bg-red-50 p-2 rounded transition" title="Apagar gasto">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            });

            const totalGeral = totalPaulo + totalGustavo;
            resumoDados.total = totalGeral; resumoDados.paulo = totalPaulo; resumoDados.gustavo = totalGustavo;

            document.getElementById('cardTotal').innerText = formatarMoeda(totalGeral);
            document.getElementById('cardPaulo').innerText = formatarMoeda(totalPaulo);
            document.getElementById('cardGustavo').innerText = formatarMoeda(totalGustavo);

            const meta = parseFloat((totalGeral / 2).toFixed(2));
            const saldoPaulo = parseFloat((totalPaulo - meta).toFixed(2)); 
            
            const cardBox = document.getElementById('cardAcertoBox');
            const cardValor = document.getElementById('cardAcertoValor');
            const cardTexto = document.getElementById('cardAcertoTexto');

            if (Math.abs(saldoPaulo) < 0.05) {
                cardBox.className = "bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700 text-white flex flex-col justify-center";
                cardValor.innerText = "R$ 0,00"; cardTexto.innerText = "Tudo quite neste mês! 🍻";
                resumoDados.textoAcerto = "Vocês estão quites! 🍻";
            } else if (saldoPaulo < 0) {
                cardBox.className = "bg-red-500 rounded-2xl p-5 shadow-lg border border-red-400 text-white flex flex-col justify-center";
                cardValor.innerText = formatarMoeda(Math.abs(saldoPaulo));
                cardTexto.innerHTML = `<i class="fa-solid fa-arrow-right"></i> Paulo deve ao Fernando`;
                resumoDados.textoAcerto = `Paulo Henrique deve transferir ${formatarMoeda(Math.abs(saldoPaulo))} para o Fernando Gustavo.`;
            } else {
                cardBox.className = "bg-emerald-500 rounded-2xl p-5 shadow-lg border border-emerald-400 text-white flex flex-col justify-center";
                cardValor.innerText = formatarMoeda(Math.abs(saldoPaulo));
                cardTexto.innerHTML = `<i class="fa-solid fa-arrow-left"></i> Fernando deve ao Paulo`;
                resumoDados.textoAcerto = `Fernando Gustavo deve transferir ${formatarMoeda(Math.abs(saldoPaulo))} para o Paulo Henrique.`;
            }

            renderizarGraficoPizza(totalPaulo, totalGustavo);
        }

        function gerarResumo() {
            const mesStr = document.getElementById('seletorMes').value;
            const texto = `🧾 *Resumo de Gastos - ${mesStr}*\n\n💰 *Total:* ${formatarMoeda(resumoDados.total)}\n👤 *Paulo Henrique:* ${formatarMoeda(resumoDados.paulo)}\n🧑‍🚀 *Fernando Gustavo:* ${formatarMoeda(resumoDados.gustavo)}\n\n⚖️ *Acerto:*\n👉 ${resumoDados.textoAcerto}`;
            navigator.clipboard.writeText(texto).then(() => alert("Resumo copiado!\n\n" + texto)).catch(() => alert(texto));
        }

        function renderizarGraficoPizza(v1, v2) {
            const ctx = document.getElementById('chartDivisao').getContext('2d');
            if (chartPizzaInstance) chartPizzaInstance.destroy();
            chartPizzaInstance = new Chart(ctx, {
                type: 'doughnut', data: { labels: ['Paulo Henrique', 'Fernando Gustavo'], datasets: [{ data: [v1, v2], backgroundColor: ['#4f46e5', '#10b981'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom' } } }
            });
        }

        document.getElementById('formGasto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const valorInput = parseFloat(document.getElementById('inputValor').value);
            if (valorInput <= 0 || isNaN(valorInput)) return showToast("Valor inválido!", true);

            const btn = document.getElementById('btnSubmit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Lançando...';
            btn.disabled = true;

            const payload = { 
                action: 'add', 
                dataGasto: document.getElementById('inputData').value, // Pegando a data que você escolheu
                usuario: document.getElementById('inputUsuario').value, 
                valor: valorInput, 
                descricao: document.getElementById('inputDescricao').value, 
                categoria: document.getElementById('inputCategoria').value 
            };

            try {
                await fetch(apiUrl, { method: 'POST', body: JSON.stringify(payload) });
                
                // Reseta só a parte de texto do formulário (mantém a data como está)
                document.getElementById('inputValor').value = '';
                document.getElementById('inputDescricao').value = '';
                
                showToast('Despesa lançada!');
                carregarMesesDisponiveis(); // Atualiza a tela inteira pra garantir que recarregue o mês certo
            } catch (error) { showToast("Erro de conexão.", true); }

            btn.innerHTML = originalText; btn.disabled = false;
        });

    </script>
</body>
</html>
